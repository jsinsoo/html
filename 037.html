<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>정보 3-7. 정렬과 탐색 알고리즘 퀴즈</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; max-width: 950px; margin: 20px auto; padding: 20px; background-color: #f0f3f5; }
        .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 25px rgba(0,0,0,0.1); border-top: 10px solid #2980b9; }
        h1 { color: #2980b9; text-align: center; border-bottom: 3px solid #2980b9; padding-bottom: 10px; }
        .user-info { background: #ebf5fb; padding: 25px; border-radius: 10px; margin-bottom: 35px; display: flex; gap: 20px; justify-content: center; align-items: center; }
        .user-info input { padding: 12px; border: 1px solid #aed6f1; border-radius: 5px; width: 200px; font-size: 1em; }
        .q-card { background: #fff; border: 1px solid #d6eaf8; padding: 30px; margin-bottom: 30px; border-radius: 12px; }
        .q-title { font-size: 1.2em; font-weight: bold; margin-bottom: 15px; color: #154360; }
        .options { list-style: none; padding: 0; }
        .options li { margin: 10px 0; padding: 12px; border-radius: 8px; border: 1px solid #f2f4f4; cursor: pointer; transition: 0.3s; }
        .options li:hover { background-color: #eaf2f8; border-color: #3498db; }
        button { display: block; width: 100%; padding: 22px; background: #2980b9; color: white; border: none; border-radius: 10px; font-size: 1.3em; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1a5276; }
    </style>
</head>
<body>

<div class="container">
    <h1>3-7. 정렬과 탐색 알고리즘 퀴즈</h1>
    
    <div class="user-info">
        <input type="text" id="studentId" placeholder="학번 (예: 30701)">
        <input type="text" id="studentName" placeholder="이름 (예: 홍길동)">
    </div>

    <div id="quiz-list"></div>

    <button onclick="submitQuiz()">제출 및 상세 리포트 생성</button>
</div>

<script>
    const quizData = [
        { q: "여러 개의 데이터를 일정한 기준에 따라 순서대로 나열하는 것을 무엇이라 하는가?", a: 2, options: ["탐색", "정렬", "추상화", "자동화", "모델링"], exp: "여러 개의 데이터를 일정한 기준에 따라 나열하는 것을 정렬이라고 합니다. [1]" },
        { q: "값이 작은 기호부터 순서대로 정리된 도서관의 책은 어떤 정렬 방식에 해당하는가?", a: 1, options: ["오름차순 정렬", "내림차순 정렬", "랜덤 정렬", "퀵 정렬", "순차 정렬"], exp: "값이 작은 것부터 큰 순서로 나열하는 것은 오름차순 정렬입니다. [1]" },
        { q: "정렬되지 않은 데이터 중 가장 작은 데이터를 선택하여 알맞은 위치로 옮기는 과정을 반복하는 알고리즘은?", a: 4, options: ["버블 정렬", "삽입 정렬", "퀵 정렬", "선택 정렬", "합병 정렬"], exp: "가장 작은 데이터를 선택하여 알맞은 위치로 옮기는 작업은 선택 정렬 알고리즘입니다. [2]" },
        { q: "선택 정렬 알고리즘을 사용하여 6개의 공을 정렬할 때 필요한 총 비교 횟수는?", a: 3, options: ["6회", "10회", "15회", "21회", "30회"], exp: "6개의 데이터를 선택 정렬할 때 비교 횟수는 5+4+3+2+1 = 총 15회입니다. [3]" },
        { q: "기준 값을 정하여 기준보다 작은 데이터는 왼쪽, 큰 데이터는 오른쪽 그룹으로 나누는 과정을 반복하는 정렬은?", a: 5, options: ["선택 정렬", "순차 정렬", "이진 정렬", "삽입 정렬", "퀵 정렬"], exp: "기준 값을 기준으로 그룹을 나누어 정렬하는 방식은 퀵 정렬입니다. [4]" },
        { q: "다음 중 퀵 정렬의 효율성이 가장 높아지는 경우는 언제인가?", a: 2, options: ["가장 작은 값이 기준일 때", "데이터의 중앙값이 기준일 때", "가장 큰 값이 기준일 때", "데이터가 역순으로 정렬되어 있을 때", "기준 값을 무작위로 선택할 때"], exp: "데이터의 중앙값이 기준이 되면 그룹이 균형 있게 나누어져 효율성이 높아집니다. [5]" },
        { q: "여러 개의 데이터 중에서 원하는 것을 찾아내는 작업을 무엇이라 하는가?", a: 1, options: ["탐색", "정렬", "인덱싱", "포매팅", "캡슐화"], exp: "데이터 중에서 원하는 값을 찾아내는 것을 탐색이라고 합니다. [6]" },
        { q: "데이터의 처음부터 끝까지를 순차적으로 하나씩 비교하며 원하는 데이터를 찾는 방법은?", a: 3, options: ["이진 탐색", "퀵 탐색", "순차 탐색", "선택 탐색", "중앙 탐색"], exp: "처음부터 끝까지 하나씩 비교하는 방법은 순차 탐색입니다. [7]" },
        { q: "순차 탐색 알고리즘을 적용할 수 있는 데이터 집합의 특징으로 옳은 것은?", a: 4, options: ["반드시 오름차순 정렬되어야 함", "반드시 내림차순 정렬되어야 함", "데이터 개수가 1,000개 이상이어야 함", "데이터가 정렬되어 있지 않아도 가능함", "중복된 데이터가 없어야 함"], exp: "순차 탐색은 데이터가 정렬되어 있지 않은 경우에도 적용할 수 있습니다. [8, 9]" },
        { q: "탐색 범위를 반으로 줄여 나가며 원하는 데이터를 찾는 방법으로 정렬된 데이터에서만 사용 가능한 것은?", a: 5, options: ["순차 탐색", "퀵 탐색", "선택 탐색", "버블 탐색", "이진 탐색"], exp: "범위를 절반씩 줄여 나가는 방식은 이진 탐색이며, 반드시 정렬되어 있어야 합니다. [10]" },
        { q: "1,000개의 데이터에서 이진 탐색을 수행할 때 최악의 경우 필요한 비교 횟수는?", a: 2, options: ["5회", "10회", "100회", "500회", "1,000회"], exp: "이진 탐색은 1,000개 데이터에 대해 최악의 경우에도 단 10번의 비교로 탐색이 가능합니다. [8, 11]" },
        { q: "순차 탐색과 이진 탐색을 비교할 때 데이터의 양이 매우 많은 경우 더 효율적인 알고리즘은?", a: 1, options: ["이진 탐색", "순차 탐색", "둘 다 동일함", "정렬 알고리즘", "데이터 구조화"], exp: "데이터 수가 많은 경우 범위를 반씩 줄이는 이진 탐색이 훨씬 효율적입니다. [8]" },
        { q: "파이썬에서 1 이상 100 이하의 정수 난수를 생성하기 위한 함수 호출 방법은?", a: 4, options: ["random.rand(100)", "random.random(1, 100)", "random.integer(1, 100)", "random.randint(1, 100)", "random.choice(100)"], exp: "random.randint(a, b)는 a 이상 b 이하 범위의 정수 난수를 생성합니다. [12, 13]" },
        { q: "탐색 범위의 데이터 개수가 짝수일 때, 이진 탐색의 중간 데이터 위치를 결정하는 방법은?", a: 2, options: ["마지막 데이터 위치", "위치 값 평균의 몫", "위치 값의 합", "첫 번째 데이터 위치", "랜덤 위치"], exp: "짝수 개일 때 중간 데이터는 첫 번째와 마지막 위치 값 평균의 몫으로 결정합니다. [14, 15]" },
        { q: "선택 정렬이 효과적으로 사용될 수 있는 상황은?", a: 3, options: ["데이터의 양이 100만 개 이상일 때", "항상 퀵 정렬보다 빠를 때", "작은 규모의 데이터를 정렬할 때", "데이터가 이미 거의 정렬되어 있을 때", "메모리 공간이 부족할 때"], exp: "선택 정렬은 알고리즘이 간단하여 작은 규모의 데이터를 정렬할 때 효과적입니다. [5, 16]" },
        { q: "이진 탐색을 적용하기 위해 선행되어야 하는 작업은?", a: 1, options: ["데이터 정렬", "데이터 삭제", "변수 선언", "파일 입출력", "주석 처리"], exp: "이진 탐색은 정렬된 데이터에서만 수행할 수 있으므로 정렬이 선행되어야 합니다. [10, 17]" },
        { q: "퀵 정렬에서 기준 값을 정하고 그룹을 나누는 과정을 무엇이라 하는가?", a: 4, options: ["합병", "선택", "순차 비교", "분할(그룹 나누기)", "탐색"], exp: "기준보다 작은 쪽과 큰 쪽으로 그룹을 나누는 과정을 거칩니다. [4, 18]" },
        { q: "7개의 공책을 번호순으로 선택 정렬할 때 총 비교 횟수는?", a: 5, options: ["7회", "12회", "15회", "18회", "21회"], exp: "7개 데이터의 선택 정렬 비교 횟수는 6+5+4+3+2+1 = 21회입니다. [19]" },
        { q: "순차 탐색에서 1,000개의 데이터를 탐색할 때 최악의 경우 비교 횟수는?", a: 5, options: ["1회", "10회", "100회", "500회", "1,000회"], exp: "순차 탐색은 최악의 경우 마지막 데이터까지 모두 확인해야 하므로 1,000회 비교가 필요합니다. [8, 11]" },
        { q: "정렬과 탐색 알고리즘을 학습하는 궁극적인 목표는?", a: 3, options: ["코드를 암기하기 위해", "그림을 잘 그리기 위해", "알고리즘의 특징과 효율을 분석하기 위해", "컴퓨터 사양을 높이기 위해", "데이터를 모두 삭제하기 위해"], exp: "다양한 알고리즘의 원리를 이해하고 특징과 효율을 비교·분석하는 것이 학습 목표입니다. [20, 21]" }
    ];

    const quizList = document.getElementById('quiz-list');
    quizData.forEach((data, i) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `<div class="q-title">${i+1}. ${data.q}</div>
            <ul class="options">
                ${data.options.map((opt, idx) => `<li><input type="radio" name="q${i}" value="${idx+1}"> ${idx+1}) ${opt}</li>`).join('')}
            </ul>`;
        quizList.appendChild(card);
    });

    function submitQuiz() {
        const id = document.getElementById('studentId').value;
        const name = document.getElementById('studentName').value;
        if(!id || !name) { alert("학번과 이름을 모두 입력해주세요."); return; }

        let score = 0;
        let report = `[ 3-7. 정렬과 탐색 알고리즘 응시 리포트 ]\n학번: ${id}  이름: ${name}\n\n`;
        
        quizData.forEach((data, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const userAns = selected ? parseInt(selected.value) : 0;
            const isCorrect = userAns === data.a;
            if(isCorrect) score += 5;
            
            report += `${i+1}번 문제: ${isCorrect ? "정답 (O)" : "오답 (X)"}\n`;
            report += `  - 나의 답변: ${userAns === 0 ? "미선택" : userAns + "번"}, 정답: ${data.a}번\n`;
            report += `  - 학습 포인트: ${data.exp}\n\n`;
        });

        const now = new Date();
        const timeStr = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}`;
        report += `--------------------------------\n최종 점수: ${score} / 100\n응시 시각: ${timeStr}`;

        const fileName = `${id}_${name}_${score}_3-7단원_${now.getTime()}.txt`;
        const blob = new Blob([report], { type: 'text/plain;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = fileName;
        link.click();
        
        alert(`제출 완료! 점수: ${score}점\n상세 풀이가 포함된 결과 파일(${fileName})이 다운로드됩니다.`);
    }
</script>
</body>
</html>
