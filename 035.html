<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>정보 3-5. 제어 구조와 데이터 구조 퀴즈</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; max-width: 900px; margin: 20px auto; padding: 20px; background-color: #f4f4f9; }
        .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 10px solid #8e44ad; }
        h1 { color: #8e44ad; text-align: center; border-bottom: 3px solid #8e44ad; padding-bottom: 10px; }
        .user-info { background: #f4ecf7; padding: 20px; border-radius: 10px; margin-bottom: 30px; display: flex; gap: 20px; justify-content: center; }
        .user-info input { padding: 10px; border: 1px solid #d7bde2; border-radius: 5px; width: 180px; }
        .q-card { background: #fff; border: 1px solid #ebedef; padding: 25px; margin-bottom: 25px; border-radius: 10px; }
        .q-title { font-size: 1.1em; font-weight: bold; margin-bottom: 15px; color: #2c3e50; }
        .options { list-style: none; padding: 0; }
        .options li { margin: 8px 0; padding: 8px; border-radius: 5px; transition: 0.2s; border: 1px solid transparent; }
        .options li:hover { background-color: #f5eef8; border-color: #af7ac5; }
        button { display: block; width: 100%; padding: 20px; background: #8e44ad; color: white; border: none; border-radius: 10px; font-size: 1.2em; font-weight: bold; cursor: pointer; }
        button:hover { background: #7d3c98; }
    </style>
</head>
<body>

<div class="container">
    <h1>3-5. 제어 구조와 데이터 구조 퀴즈</h1>
    
    <div class="user-info">
        <input type="text" id="studentId" placeholder="학번 (예: 30501)">
        <input type="text" id="studentName" placeholder="이름 (예: 홍길동)">
    </div>

    <div id="quiz-list"></div>

    <button onclick="downloadReport()">제출 및 상세 결과 파일 다운로드</button>
</div>

<script>
    const quizData = [
        { q: "프로그램의 처리 과정을 제어하기 위한 구조를 무엇이라 하는가?", a: 1, options: ["제어 구조", "데이터 구조", "알고리즘 모델", "변수 구조", "하드웨어 구조"], exp: "제어 구조는 프로그램의 처리 과정을 제어하기 위한 구조를 의미합니다. [2, 4]" },
        { q: "제어 구조의 세 가지 기본 유형으로 옳은 것은?", a: 2, options: ["입력, 처리, 출력", "순차, 선택, 반복", "변수, 자료형, 연산", "함수, 클래스, 모듈", "정수, 실수, 문자"], exp: "제어 구조에는 순차 구조, 선택 구조, 반복 구조가 있습니다. [2, 4]" },
        { q: "주어진 조건에 따라 프로그램의 흐름을 달리하고자 할 때 사용하는 구조는?", a: 3, options: ["순차 구조", "데이터 구조", "선택 구조", "추상화 구조", "반복 구조"], exp: "선택 구조는 주어진 조건에 따라 프로그램의 흐름을 달리할 때 사용합니다. [2]" },
        { q: "파이썬에서 선택 구조를 만들기 위해 사용하는 기본 키워드는?", a: 4, options: ["for", "while", "repeat", "if", "input"], exp: "선택 구조에는 if문, if~else문, if~elif~else문 등이 활용됩니다. [4, 5]" },
        { q: "조건식이 참일 때 실행할 문장 1과 거짓일 때 실행할 문장 2를 구분하는 구조는?", a: 2, options: ["if문", "if~else문", "if~elif문", "while문", "for문"], exp: "if~else문은 조건이 참이면 문장 1을, 거짓이면 문장 2를 실행합니다. [4, 6]" },
        { q: "파이썬에서 실행 범위를 결정하며, 지키지 않을 시 오류를 발생시키는 필수 규칙은?", a: 5, options: ["세미콜론(;) 사용", "대문자 작성", "주석 처리", "괄호 생략", "들여쓰기(Tap)"], exp: "파이썬에서 들여쓰기는 실행 범위를 결정하므로 반드시 규칙에 맞게 지켜야 합니다. [7]" },
        { q: "같은 명령을 반복하여 실행할 때 사용하여 코드를 간결하게 만드는 구조는?", a: 1, options: ["반복 구조", "선택 구조", "순차 구조", "다차원 구조", "분기 구조"], exp: "반복 구조는 같은 명령을 반복 실행할 때 사용하며 코드를 간결하고 효율적으로 만듭니다. [4, 8]" },
        { q: "리스트나 range 등을 활용하여 정해진 범위만큼 반복할 때 주로 쓰는 문은?", a: 4, options: ["while문", "if문", "switch문", "for문", "else문"], exp: "for문은 리스트, 문자열, range 등을 활용하여 반복문을 실행합니다. [4, 9]" },
        { q: "조건식이 참인 동안 계속해서 명령을 반복 실행하고, 거짓이면 종료하는 문은?", a: 3, options: ["for문", "if문", "while문", "elif문", "else문"], exp: "while문은 조건식이 참이면 명령을 실행하고 반복하며, 거짓이면 종료합니다. [4, 10]" },
        { q: "반복문 속 반복문처럼 여러 제어 구조를 겹쳐서 사용하는 것을 무엇이라 하는가?", a: 5, options: ["중복 구조", "이중 구조", "복합 구조", "계층 구조", "중첩 제어 구조"], exp: "반복문 속 반복문 등 여러 제어 구조를 겹쳐 사용하는 것을 중첩 제어 구조라고 합니다. [11]" },
        { q: "컴퓨터에서 효율적으로 자료를 처리하고 관리하기 위한 구조를 무엇이라 하는가?", a: 2, options: ["제어 구조", "데이터 구조", "알고리즘", "인덱스 구조", "변수 집합"], exp: "데이터 구조는 컴퓨터에서 효율적으로 자료를 처리하고 관리하기 위한 구조입니다. [3, 4]" },
        { q: "여러 데이터를 관리하기 쉽게 같은 이름으로 생성하여 관리하는 대표적 구조는?", a: 1, options: ["리스트", "정수형", "불형", "변수명", "출력문"], exp: "데이터 구조는 리스트가 주로 활용됩니다. [3, 4]" },
        { q: "리스트의 값들에 접근하기 위해 사용하는 번호를 무엇이라 하는가?", a: 4, options: ["넘버링", "포인터", "주소값", "인덱스", "키워드"], exp: "리스트 값의 순서를 인덱스라고 하며, 이를 통해 특정 값에 접근할 수 있습니다. [12]" },
        { q: "리스트의 인덱스 번호는 몇 번부터 시작하는가?", a: 1, options: ["0번", "1번", "100번", "변수명 번호", "마지막 번호"], exp: "리스트의 인덱스 번호는 0부터 시작합니다. [12]" },
        { q: "2명 이상의 학생 자료(이름, 성적 등)를 저장할 때 가장 효율적인 리스트 형태는?", a: 2, options: ["1차원 리스트", "2차원 리스트", "3차원 리스트", "문자형 리스트", "불형 리스트"], exp: "2명 이상 학생의 여러 속성 자료를 저장할 때에는 2차원 리스트가 효율적입니다. [13]" },
        { q: "2차원 리스트 s[14][15]는 무엇을 의미하는가?", a: 5, options: ["3행 4행", "3열 4열", "3열 4행", "4행 3열", "3행 4열"], exp: "2차원 리스트는 리스트이름[행][열]의 구조로 되어 있습니다. [16, 17]" },
        { q: "range(1, 4, 1)이 생성하는 숫자의 나열로 옳은 것은?", a: 3, options: ["1, 2, 3, 4", "1, 3, 4", "1, 2, 3", "0, 1, 2", "1, 4, 1"], exp: "range(시작, 종료, 증감)는 시작값부터 종료값 직전까지 변화합니다. [18, 19]" },
        { q: "print() 실행 후 자동으로 줄을 바꾸지 않고 이어서 출력하게 하는 옵션은?", a: 2, options: ["newline=' '", "end=' '", "space=' '", "continue", "next"], exp: "결과를 이어서 출력하기 위해서는 end = ' ' 옵션을 추가합니다. [20, 21]" },
        { q: "비교 연산자 중 'a와 b가 같은가?'를 묻는 연산자는?", a: 4, options: ["a = b", "a != b", "a > b", "a == b", "a is b"], exp: "== 연산자는 두 값이 같은지 비교합니다. [22]" },
        { q: "두 조건 a와 b가 동시에 참일 때만 전체가 참이 되는 논리 연산자는?", a: 1, options: ["and", "or", "not", "but", "also"], exp: "and 연산자는 a와 b가 동시에 참일 때만 전체가 참이 됩니다. [22]" }
    ];

    const quizList = document.getElementById('quiz-list');
    quizData.forEach((data, i) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `<div class="q-title">${i+1}. ${data.q}</div>
            <ul class="options">
                ${data.options.map((opt, idx) => `<li><input type="radio" name="q${i}" value="${idx+1}"> ${idx+1}) ${opt}</li>`).join('')}
            </ul>`;
        quizList.appendChild(card);
    });

    function downloadReport() {
        const id = document.getElementById('studentId').value;
        const name = document.getElementById('studentName').value;
        if(!id || !name) { alert("학번과 이름을 입력해주세요."); return; }

        let score = 0;
        let reportText = `[ 3-5. 제어 구조와 데이터 구조 학습 결과 보고서 ]\n학번: ${id}\n이름: ${name}\n\n`;
        
        quizData.forEach((data, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const userAns = selected ? parseInt(selected.value) : 0;
            const isCorrect = userAns === data.a;
            if(isCorrect) score += 5;
            
            reportText += `${i+1}번 문제: ${isCorrect ? "O (정답)" : "X (오답)"}\n`;
            reportText += `  - 나의 선택: ${userAns === 0 ? "미응답" : userAns + "번"}, 실제 정답: ${data.a}번\n`;
            reportText += `  - 상세 풀이: ${data.exp}\n\n`;
        });

        const now = new Date();
        const timeStr = now.toLocaleString();
        reportText += `--------------------------------\n최종 점수: ${score} / 100\n응시 시각: ${timeStr}`;

        const fileName = `${id}_${name}_${score}_3-5단원_${now.getTime()}.txt`;
        const blob = new Blob([reportText], { type: 'text/plain;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = fileName;
        link.click();
        
        alert(`제출 완료! 점수: ${score}점\n상세 해설이 포함된 결과 파일이 저장됩니다.`);
    }
</script>
</body>
</html>
