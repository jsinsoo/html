<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>정보 3-1. 알고리즘과 문제 해결 퀴즈</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; max-width: 900px; margin: 20px auto; padding: 20px; background-color: #f9f9f9; }
        .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2e7d32; text-align: center; border-bottom: 3px solid #2e7d32; padding-bottom: 10px; }
        .user-info { background: #e8f5e9; padding: 20px; border-radius: 10px; margin-bottom: 30px; display: flex; gap: 20px; justify-content: center; }
        .user-info input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 180px; }
        .q-card { background: #fff; border: 1px solid #ddd; padding: 25px; margin-bottom: 25px; border-radius: 10px; }
        .q-title { font-size: 1.1em; font-weight: bold; margin-bottom: 15px; color: #333; }
        .options { list-style: none; padding: 0; }
        .options li { margin: 8px 0; padding: 8px; border-radius: 5px; transition: 0.2s; }
        .options li:hover { background-color: #f0f0f0; }
        button { display: block; width: 100%; padding: 20px; background: #2e7d32; color: white; border: none; border-radius: 10px; font-size: 1.2em; font-weight: bold; cursor: pointer; }
        button:hover { background: #1b5e20; }
    </style>
</head>
<body>

<div class="container">
    <h1>3-1. 알고리즘과 문제 해결 퀴즈</h1>
    
    <div class="user-info">
        <input type="text" id="studentId" placeholder="학번 (예: 30101)">
        <input type="text" id="studentName" placeholder="이름 (예: 이몽룡)">
    </div>

    <div id="quiz-list"></div>

    <button onclick="generateReport()">제출 및 결과 파일 생성</button>
</div>

<script>
    const quizData = [
        { q: "문제를 해결하기 위해 필요한 구체적인 방법과 절차를 무엇이라 하는가?", a: 2, options: ["추상화", "알고리즘", "자동화", "프로그래밍", "모델링"], exp: "알고리즘은 문제를 해결하기 위한 구체적인 방법과 절차를 의미합니다. [1]" },
        { q: "알고리즘(Algorithm)이라는 용어의 유래가 된 인물은?", a: 4, options: ["피타고라스", "뉴턴", "가우스", "무함마드 알콰리즈미", "튜링"], exp: "알고리즘은 9세기 페르시아 수학자 무함마드 알콰리즈미의 이름에서 유래되었습니다. [1]" },
        { q: "컴퓨터 과학에서 '문제'의 정의로 가장 적절한 것은?", a: 1, options: ["목표 상태와 현재 상태가 일치하지 않는 상황", "수학적인 공식이 필요한 상황", "말썽이나 귀찮은 일이 생긴 상황", "정답이 정해져 있지 않은 질문", "컴퓨터가 고장 난 상태"], exp: "문제란 목표로 하는 상태와 현재의 상태가 일치하지 않는 상황을 뜻합니다. [2, 3]" },
        { q: "컴퓨터로 문제를 해결하기 위한 3단계 절차를 순서대로 나열한 것은?", a: 3, options: ["설계 - 구현 - 평가", "분석 - 모델링 - 프로그래밍", "추상화 - 알고리즘 설계 - 자동화", "입력 - 처리 - 출력", "문제 인식 - 해결 - 보고"], exp: "컴퓨터로 문제를 해결하기 위해서는 추상화, 알고리즘 설계, 자동화의 절차가 필요합니다. [3, 4]" },
        { q: "문제의 복잡성을 제거하여 해결하기 쉬운 형태로 핵심 요소를 추출하는 단계는?", a: 1, options: ["추상화", "알고리즘 설계", "자동화", "성능 평가", "디버깅"], exp: "추상화는 문제의 복잡성을 제거하여 해결하기 용이한 형태로 문제를 재표현하는 것입니다. [3, 5]" },
        { q: "알고리즘의 조건 중 '알고리즘은 반드시 종료되어야 한다'는 조건은?", a: 4, options: ["명확성", "수행 가능성", "출력", "유한성", "입력"], exp: "알고리즘은 반드시 종료되어야 한다는 조건을 유한성이라고 합니다. [6]" },
        { q: "알고리즘의 조건 중 '모호함이 없이 의미가 분명해야 한다'는 조건은?", a: 3, options: ["입력", "출력", "명확성", "유한성", "수행 가능성"], exp: "알고리즘을 수행할 때 모호함 없이 의미가 분명해야 하는 것을 명확성이라고 합니다. [6]" },
        { q: "알고리즘을 프로그래밍 언어와 유사한 가상의 코드로 표현하는 방식은?", a: 2, options: ["자연어", "의사 코드(Pseudo Code)", "순서도", "파이썬", "흐름선"], exp: "의사 코드는 가상의 코드라는 의미로, 실제 프로그래밍 언어는 아니지만 유사하게 표현하는 방식입니다. [7]" },
        { q: "미리 약속한 도형과 흐름선을 사용하여 알고리즘을 표현하는 방법은?", a: 5, options: ["자연어", "의사 코드", "구문론", "데이터 구조", "순서도"], exp: "순서도는 미리 약속한 도형과 흐름선을 사용하여 알고리즘을 표현하는 방법입니다. [7]" },
        { q: "알고리즘 설계 단계에서 사용하는 기본 제어 구조가 아닌 것은?", a: 5, options: ["순차 구조", "선택 구조", "반복 구조", "조건 구조", "병렬 구조"], exp: "알고리즘은 순차, 선택, 반복 구조 등을 이용하여 설계할 수 있습니다. [8]" },
        { q: "자동화 단계에 포함되는 두 가지 주요 과정은?", a: 1, options: ["프로그래밍과 성능 평가", "추상화와 모델링", "입력과 출력", "설계와 검증", "분석과 구현"], exp: "자동화 단계는 설계한 알고리즘을 구현하는 프로그래밍 과정과 실행 결과를 분석하는 성능 평가 과정을 포함합니다. [3, 9]" },
        { q: "본 학습 자료에서 알고리즘 자동화(프로그래밍)를 위해 사용한 언어는?", a: 4, options: ["C언어", "자바", "엔트리", "파이썬(Python)", "스크래치"], exp: "본문에서 사용한 프로그래밍 언어는 파이썬(Python)입니다. [10, 11]" },
        { q: "일상생활 속 정렬 알고리즘의 예시로 적절한 것은?", a: 2, options: ["가장 빠른 길 찾기", "게시글을 최신순으로 보기", "영화 추천받기", "라면 끓이기", "양치질하기"], exp: "게시글이나 댓글을 특정 기준에 따라 나열하는 것은 정렬 알고리즘의 예입니다. [12]" },
        { q: "4만 명의 관람객 중 범인을 찾기 위해 절반씩 나누어 조사할 때 필요한 경찰의 수는?", a: 3, options: ["10명", "15명", "16명", "20명", "32명"], exp: "40,000을 1이 될 때까지 절반으로 나눈 횟수는 15회이며, 마지막 확인 인원을 포함하여 16명이 필요합니다. [3, 10]" },
        { q: "입장객 수를 변수 visitors에 저장하고 1이 될 때까지 반으로 나누는 파이썬 연산자는?", a: 4, options: ["/", "%", "**", "//", "*"], exp: "파이썬에서 몫을 구하는 연산자 `//`를 사용하여 관람객 수를 절반으로 나눕니다. [10, 13]" },
        { q: "알고리즘의 조건 중 '적어도 1개 이상의 결과가 나와야 한다'는 조건은?", a: 2, options: ["입력", "출력", "명확성", "유한성", "수행 가능성"], exp: "알고리즘이 수행되면 적어도 1개 이상의 결과가 출력되어야 합니다. [6]" },
        { q: "8퍼즐 문제 해결에서 '완성된 숫자판' 상태는 무엇에 해당하는가?", a: 2, options: ["초기 상태", "목표 상태", "핵심 요소", "수행 작업", "알고리즘"], exp: "8퍼즐 게임에서 배치하고자 하는 완성된 숫자판은 목표 상태를 의미합니다. [14]" },
        { q: "추상화 과정에서 문제를 해결 가능한 작은 단위로 나누는 것을 무엇이라 하는가?", a: 5, options: ["성능 평가", "자동화", "알고리즘 설계", "입출력 정의", "문제 분해"], exp: "문제를 해결 가능한 작은 문제로 분해하고 모델링하면 복잡한 문제를 쉽게 해결할 수 있습니다. [15]" },
        { q: "알고리즘 설계 시 고려해야 할 사항으로 가장 옳은 것은?", a: 3, options: ["가장 긴 코드를 작성한다.", "하나의 문제에는 하나의 알고리즘만 존재한다.", "다양한 알고리즘을 비교 분석하여 더 좋은 것을 선택한다.", "컴퓨터 언어로만 표현해야 한다.", "입력 데이터가 없어야 한다."], exp: "하나의 문제를 해결하기 위한 알고리즘은 다양할 수 있으며, 이를 비교 분석하여 더 좋은 알고리즘을 설계해야 합니다. [6]" },
        { q: "같은 명령을 여러 번 실행하도록 표현한 알고리즘 구조는?", a: 3, options: ["순차 구조", "선택 구조", "반복 구조", "분기 구조", "병렬 구조"], exp: "같은 명령을 여러 번 반복하여 실행하도록 표현한 구조를 반복 구조라고 합니다. [8]" }
    ];

    const quizList = document.getElementById('quiz-list');
    quizData.forEach((data, i) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `<div class="q-title">${i+1}. ${data.q}</div>
            <ul class="options">
                ${data.options.map((opt, idx) => `<li><input type="radio" name="q${i}" value="${idx+1}"> ${idx+1}) ${opt}</li>`).join('')}
            </ul>`;
        quizList.appendChild(card);
    });

    function generateReport() {
        const id = document.getElementById('studentId').value;
        const name = document.getElementById('studentName').value;
        if(!id || !name) { alert("학번과 이름을 입력해주세요."); return; }

        let score = 0;
        let resultTxt = `[ 3-1. 알고리즘과 문제 해결 응시 결과 ]\n학번: ${id}\n이름: ${name}\n\n`;
        
        quizData.forEach((data, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const userAns = selected ? parseInt(selected.value) : 0;
            const isCorrect = userAns === data.a;
            if(isCorrect) score += 5;
            
            resultTxt += `${i+1}번 문제: ${isCorrect ? "O (정답)" : "X (오답)"}\n`;
            resultTxt += `  - 나의 답: ${userAns === 0 ? "미응답" : userAns + "번"}, 정답: ${data.a}번\n`;
            resultTxt += `  - 풀이: ${data.exp}\n\n`;
        });

        const now = new Date();
        const timeStr = now.toLocaleString();
        resultTxt += `--------------------------------\n최종 점수: ${score} / 100\n응시 시각: ${timeStr}`;

        const fileName = `${id}_${name}_${score}_3-1단원_${now.getTime()}.txt`;
        const blob = new Blob([resultTxt], { type: 'text/plain;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = fileName;
        link.click();
        
        alert(`제출 완료! 점수: ${score}점\n결과 파일이 다운로드됩니다.`);
    }
</script>
</body>
</html>
