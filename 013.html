<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>정보 1-3. 사물 인터넷 시스템 구현 퀴즈</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; max-width: 900px; margin: 20px auto; padding: 20px; background-color: #f4f7f6; }
        .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        .info-box { background: #eef2f7; padding: 20px; border-radius: 10px; margin-bottom: 30px; display: flex; gap: 15px; justify-content: center; }
        .info-box input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; width: 150px; }
        .question-card { background: #fff; border: 1px solid #eee; padding: 25px; margin-bottom: 25px; border-radius: 10px; }
        .question-text { font-size: 1.15em; font-weight: bold; margin-bottom: 15px; color: #34495e; }
        .options-list { list-style: none; padding: 0; }
        .options-list li { margin: 10px 0; padding: 10px; border-radius: 5px; border: 1px solid #f0f0f0; cursor: pointer; transition: 0.2s; }
        .options-list li:hover { background-color: #f9f9f9; border-color: #3498db; }
        button#submit-btn { display: block; width: 100%; padding: 20px; background: #3498db; color: white; border: none; border-radius: 10px; font-size: 1.2em; font-weight: bold; cursor: pointer; }
        button#submit-btn:hover { background: #2980b9; }
    </style>
</head>
<body>

<div class="container">
    <h1>1-3. 사물 인터넷 시스템 구현 퀴즈</h1>
    
    <div class="info-box">
        <input type="text" id="studentId" placeholder="학번 입력 (예: 10101)">
        <input type="text" id="studentName" placeholder="이름 입력 (예: 홍길동)">
    </div>

    <div id="quiz-area"></div>

    <button id="submit-btn" onclick="processQuiz()">제출 및 상세 결과 파일 저장</button>
</div>

<script>
    const questions = [
        { q: "사물 인터넷 시스템을 구현하기 위해 필요한 3가지 핵심 요소가 아닌 것은?", a: 5, options: ["하드웨어", "소프트웨어", "통신 기술", "센서 및 마이크로컨트롤러", "데이터 데이터베이스"], exp: "사물 인터넷 시스템 구현에는 센서/마이크로컨트롤러 보드 같은 하드웨어, 통신 기술, 그리고 이를 제어할 소프트웨어가 필요합니다. [1]" },
        { q: "입력과 출력 장치를 제어하며 프로그램 명령을 수행하는 장치(MCU)의 정식 명칭은?", a: 1, options: ["마이크로컨트롤러", "중앙처리장치(CPU)", "그래픽카드", "액추에이터", "컴퓨팅 인터페이스"], exp: "마이크로컨트롤러(MCU)는 입력/출력 장치를 제어하며 명령을 수행하는 장치로 로봇 등을 제어합니다. [2]" },
        { q: "다음 중 오픈 소스 하드웨어가 아닌 것은?", a: 4, options: ["마이크로비트", "아두이노", "라즈베리파이", "인텔 i9 프로세서", "모두 오픈 소스이다"], exp: "마이크로비트, 아두이노, 라즈베리파이는 회로도와 제작 과정이 공개된 오픈 소스 하드웨어의 예시입니다. [1, 3]" },
        { q: "프로그램 개발에 필요한 작업을 하나로 통합한 도구(IDE)를 의미하는 용어는?", a: 2, options: ["통신 프로토콜", "통합 개발 환경", "알고리즘 엔진", "컴파일러", "하드웨어 라이브러리"], exp: "IDE(Integrated Development Environment)는 프로그램 개발에 필요한 작업을 하나로 통합한 도구입니다. [1]" },
        { q: "마이크로비트의 라디오 통신 기능으로 데이터를 주고받을 수 있는 최대 거리는 대략 얼마인가?", a: 3, options: ["5m 이내", "10m 이내", "20m 이내", "50m 이내", "100m 이내"], exp: "마이크로비트의 내장 라디오 기능을 이용하면 20m 거리 내에서 데이터를 주고받을 수 있습니다. [4]" },
        { q: "마이크로비트 라디오 그룹을 설정할 수 있는 정수의 범위는?", a: 1, options: ["0 ~ 255", "1 ~ 100", "0 ~ 1024", "1 ~ 256", "제한 없음"], exp: "라디오 그룹은 0 이상 255 이하의 정수 가운데 하나로 설정할 수 있습니다. [4]" },
        { q: "문제를 해결하기 위해 필요한 구체적인 방법과 절차를 무엇이라 하는가?", a: 2, options: ["프로그래밍", "알고리즘", "시스템 설계", "데이터 분석", "순서도"], exp: "알고리즘은 문제를 해결하기 위해 필요한 구체적인 방법과 절차를 의미합니다. [5]" },
        { q: "운동 칼로리 계산 시스템 실습에서 스쿼트 횟수를 감지하기 위해 사용한 센서는?", a: 3, options: ["조도 센서", "소리 센서", "가속도 센서", "초음파 센서", "온도 센서"], exp: "움직임을 감지하여 운동 횟수를 체크하기 위해 가속도 센서를 이용합니다. [6]" },
        { q: "운동 실습에서 마이크로비트 스크린이 어느 방향을 향할 때 1회 운동으로 인정했는가?", a: 4, options: ["바닥 방향", "왼쪽 방향", "오른쪽 방향", "하늘 방향", "정면 방향"], exp: "마이크로비트의 스크린이 하늘을 향할 경우를 1회 운동으로 인정하도록 알고리즘을 설계했습니다. [5]" },
        { q: "실습에서 설정한 스쿼트 1회당 소모 칼로리량은?", a: 1, options: ["0.32 kcal", "1.0 kcal", "0.5 kcal", "0.15 kcal", "3.2 kcal"], exp: "제시된 예제에서는 회당 0.32kcal로 계산하여 결과를 출력하도록 했습니다. [5]" },
        { q: "스마트 전등 시스템 실습에서 전등의 밝기를 자동으로 조절하기 위해 사용한 센서는?", a: 2, options: ["소리 센서", "조도 센서", "습도 센서", "터치 센서", "기압 센서"], exp: "주변 밝기를 입력받기 위해 조도 센서를 사용합니다. [7]" },
        { q: "스마트 전등 시스템의 알고리즘으로 옳은 것은?", a: 5, options: ["밝으면 더 밝게", "주변 밝기에 상관없이 최대", "사용자 목소리에 반응", "배터리 잔량에 비례", "주변 밝기에 반비례"], exp: "주변 밝기를 감지하여 LED의 밝기가 주변 밝기에 반비례하도록 설정합니다(어두우면 밝게). [8]" },
        { q: "마이크로비트 코딩(메이크코드) 시 주의할 점으로 옳은 것은?", a: 3, options: ["모든 블록은 동일하다", "한글 변수는 사용할 수 없다", "수치형과 문자형 비교 블록이 다름에 유의한다", "무한루프는 사용할 수 없다", "무선 통신은 항상 켜져 있다"], exp: "수치형 비교 블록과 문자형 비교 블록이 서로 다름에 유의하여 프로그래밍해야 합니다. [8]" },
        { q: "층간 소음 예방 시스템 실습에서 소음 크기를 측정하기 위해 사용한 센서는?", a: 1, options: ["소리 센서", "진동 센서", "가속도 센서", "조도 센서", "근접 센서"], exp: "주변 소리의 크기를 감지하기 위해 소리 센서를 활용합니다. [9]" },
        { q: "층간 소음 시스템에서 경고음을 출력하기 위해 필요한 출력 장치는?", a: 4, options: ["LED", "모터", "서보", "스피커", "블루투스 안테나"], exp: "경고음을 출력하기 위해 스피커(또는 버저)를 구성 요소로 사용합니다. [9]" },
        { q: "층간 소음 시스템 구현 시 세대 간 혼선을 방지하기 위한 방법은?", a: 2, options: ["동일한 라디오 그룹 설정", "세대별로 서로 다른 라디오 그룹 설정", "통신 거리를 1m로 제한", "모두 유선으로 연결", "비밀번호 설정"], exp: "세대별로 서로 다른 라디오 그룹을 설정하여 혼선이 발생하지 않도록 방지합니다. [9]" },
        { q: "피지컬 컴퓨팅 시스템 하드웨어 구성 요소 중 '처리를 위한 장치'에 해당하는 것은?", a: 3, options: ["센서", "액추에이터", "마이크로컨트롤러", "랜 케이블", "스피커"], exp: "하드웨어는 센서(입력), 마이크로컨트롤러(처리), 액추에이터(출력)로 구분됩니다. [10]" },
        { q: "다음 중 '출력을 위한 액추에이터'에 해당하는 장치는?", a: 5, options: ["조도 센서", "가속도 센서", "마이크로비트 보드", "소리 센서", "스피커/LED"], exp: "스피커나 LED는 처리된 결과를 밖으로 내보내는 출력을 위한 액추에이터입니다. [10]" },
        { q: "마이크로비트 전용 통합 개발 환경(IDE)의 이름은?", a: 4, options: ["파이썬", "엔트리", "스크래치", "메이크코드(MakeCode)", "아두이노 IDE"], exp: "마이크로비트 통합 개발 환경인 메이크코드를 활용하여 실습을 진행합니다. [11]" },
        { q: "사물 인터넷 시스템을 설계할 때 가장 먼저 고려해야 할 사항은?", a: 1, options: ["시스템의 목적을 분명히 함", "가장 비싼 부품 선택", "디자인 요소 결정", "서버 구축", "인공지능 탑재 여부"], exp: "설계 시에는 그 목적을 분명히 하여 적절한 하드웨어, 소프트웨어, 통신 기술을 선택해야 합니다. [11]" }
    ];

    const quizArea = document.getElementById('quiz-area');
    questions.forEach((q, i) => {
        const div = document.createElement('div');
        div.className = 'question-card';
        div.innerHTML = `<div class="question-text">${i+1}. ${q.q}</div>
            <ul class="options-list">
                ${q.options.map((opt, idx) => `<li><input type="radio" name="q${i}" value="${idx+1}"> ${idx+1}) ${opt}</li>`).join('')}
            </ul>`;
        quizArea.appendChild(div);
    });

    function processQuiz() {
        const sid = document.getElementById('studentId').value;
        const sname = document.getElementById('studentName').value;
        if(!sid || !sname) { alert("학번과 이름을 입력해주세요."); return; }

        let score = 0;
        let content = `[ 1-3. 사물 인터넷 시스템 구현 퀴즈 결과 ]\n`;
        content += `학번: ${sid}  이름: ${sname}\n\n`;
        
        questions.forEach((q, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const userAns = selected ? parseInt(selected.value) : 0;
            const isCorrect = userAns === q.a;
            if(isCorrect) score += 5;
            
            content += `${i+1}번 문제: ${isCorrect ? "O (정답)" : "X (오답)"}\n`;
            content += ` - 제출답안: ${userAns === 0 ? "미선택" : userAns + "번"}, 실제정답: ${q.a}번\n`;
            content += ` - 상세풀이: ${q.exp}\n\n`;
        });

        const now = new Date();
        const timeStr = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours()}:${now.getMinutes()}`;
        content += `----------------------------\n최종 점수: ${score} / 100\n응시 시각: ${timeStr}`;

        const fileName = `${sid}_${sname}_${score}_1-3단원_${now.getTime()}.txt`;
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = fileName;
        link.click();
        
        alert(`제출 완료!\n점수: ${score}점\n파일(${fileName})이 다운로드됩니다.`);
    }
</script>
</body>
</html>
