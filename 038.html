<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>정보 3-8. 협력적 문제 해결 프로젝트 퀴즈</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; max-width: 900px; margin: 20px auto; padding: 20px; background-color: #f4f7f6; }
        .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border-top: 10px solid #27ae60; }
        h1 { color: #27ae60; text-align: center; border-bottom: 3px solid #27ae60; padding-bottom: 10px; }
        .user-info { background: #eafaf1; padding: 20px; border-radius: 10px; margin-bottom: 30px; display: flex; gap: 20px; justify-content: center; }
        .user-info input { padding: 10px; border: 1px solid #2ecc71; border-radius: 5px; width: 180px; }
        .q-card { background: #fff; border: 1px solid #d5f5e3; padding: 25px; margin-bottom: 25px; border-radius: 10px; }
        .q-title { font-size: 1.1em; font-weight: bold; margin-bottom: 15px; color: #145a32; }
        .options { list-style: none; padding: 0; }
        .options li { margin: 8px 0; padding: 8px; border-radius: 5px; transition: 0.2s; border: 1px solid transparent; }
        .options li:hover { background-color: #e9f7ef; border-color: #2ecc71; }
        button { display: block; width: 100%; padding: 20px; background: #27ae60; color: white; border: none; border-radius: 10px; font-size: 1.2em; font-weight: bold; cursor: pointer; }
        button:hover { background: #1e8449; }
    </style>
</head>
<body>

<div class="container">
    <h1>3-8. 협력적 문제 해결 프로젝트 퀴즈</h1>
    
    <div class="user-info">
        <input type="text" id="studentId" placeholder="학번 (예: 30801)">
        <input type="text" id="studentName" placeholder="이름 (예: 홍길동)">
    </div>

    <div id="quiz-list"></div>

    <button onclick="downloadReport()">제출 및 상세 결과 파일 다운로드</button>
</div>

<script>
    const quizData = [
        { q: "문제 해결 프로젝트의 올바른 절차를 순서대로 나열한 것은?", a: 1, options: ["주제 선정 - 추상화 - 알고리즘 설계 - 프로그램 작성 - 평가 및 공유", "주제 선정 - 알고리즘 설계 - 프로그램 작성 - 추상화 - 평가 및 공유", "추상화 - 주제 선정 - 프로그램 작성 - 알고리즘 설계 - 평가 및 공유", "알고리즘 설계 - 추상화 - 프로그램 작성 - 주제 선정 - 평가 및 공유", "주제 선정 - 추상화 - 프로그램 작성 - 알고리즘 설계 - 평가 및 공유"], exp: "프로젝트 절차는 주제 선정 및 문제 정의 → 추상화 → 알고리즘 설계 → 프로그램 작성 → 성능 평가 및 공유 순으로 이루어집니다 [1, 2]." },
        { q: "자유로운 분위기 속에서 다양한 아이디어를 제안하며 최선의 안을 선정하는 방법은?", a: 3, options: ["디버깅", "모델링", "브레인스토밍", "알고리즘 설계", "추상화"], exp: "브레인스토밍은 자유로운 분위기에서 아이디어를 제안하고 조합하여 새로운 아이디어를 창조하는 방법입니다 [1]." },
        { q: "추상화 단계의 구성 요소가 아닌 것은?", a: 5, options: ["문제 분석", "문제 분해", "모델링", "초기 및 목표 상태 설정", "프로그램 작성"], exp: "추상화는 문제 분석, 문제 분해, 모델링 과정으로 구성됩니다 [1]." },
        { q: "문제의 복잡성을 제거하고 해결하기 쉬운 형태로 표현하는 과정을 무엇이라 하는가?", a: 2, options: ["알고리즘 설계", "추상화", "디버깅", "컴파일", "성능 평가"], exp: "문제의 복잡성을 제거하고 해결하기 쉬운 형태로 표현하는 것을 추상화라고 합니다 [1]." },
        { q: "복잡한 문제를 해결 가능한 작은 문제로 나누는 과정을 무엇이라 하는가?", a: 4, options: ["모델링", "문제 분석", "알고리즘 설계", "문제 분해", "성능 평가"], exp: "복잡한 문제를 해결 가능한 작은 문제로 나누는 것은 문제 분해입니다 [1]." },
        { q: "글, 그림, 그래프, 표 등을 사용하여 문제를 구조화하는 과정은?", a: 1, options: ["모델링", "알고리즘 설계", "추상화", "프로그램 작성", "디버깅"], exp: "복잡한 문제를 해결 가능한 형태로 다시 표현하기 위해 글, 그림 등을 사용하여 구조화하는 것이 모델링입니다 [1]." },
        { q: "알고리즘을 설계할 때 사용할 수 있는 방법이 아닌 것은?", a: 5, options: ["자연어", "순서도", "의사 코드", "흐름선", "기계어"], exp: "알고리즘은 자연어, 순서도, 의사 코드 중 편리한 방법으로 작성합니다 [3]." },
        { q: "프로그램의 코드를 한 줄씩 확인하며 오류를 찾아 수정하는 과정을 무엇이라 하는가?", a: 3, options: ["컴파일", "추상화", "디버깅", "모델링", "성능 평가"], exp: "프로그램의 오류를 찾아 수정하는 과정을 디버깅이라고 합니다 [4]." },
        { q: "디버깅(Debugging) 용어의 유래와 관계 깊은 동물은?", a: 2, options: ["개미", "나방(벌레)", "거미", "파리", "벌"], exp: "그레이스 호퍼가 컴퓨터 회로에 끼어 있는 나방(Bug)을 발견한 것에서 디버깅이라는 용어가 유래되었습니다 [4]." },
        { q: "제동 거리 계산 프로젝트에서 km/h 단위를 m/s 단위로 바꾸기 위해 사용하는 수식은?", a: 4, options: ["v1 * 60 / 3600", "v1 * 100 / 3600", "v1 * 1000 / 60", "v1 * 1000 / 3600", "v1 / 3.6 * 1000"], exp: "속도 단위를 통일하기 위해 현재 속도(v1) * 1000 / 3600을 수행합니다 [5, 6]." },
        { q: "제동 거리 계산 공식으로 옳은 것은? (v:현재속도, a:제동가속도)", a: 1, options: ["v² / (2 * a)", "v / (2 * a)", "v * v * a", "2 * a / v²", "(v + a) / 2"], exp: "제동 거리는 (현재 속도²) / (2 * 제동 가속도 크기)로 계산합니다 [6, 7]." },
        { q: "운전자가 위험을 발견하고 브레이크를 밟기 전까지 이동한 거리를 무엇이라 하는가?", a: 3, options: ["제동 거리", "정지 거리", "공주 거리", "제동 가속도", "회피 거리"], exp: "브레이크가 제동이 걸리기 시작할 때까지의 이동 거리는 공주 거리입니다 [8]." },
        { q: "자동차의 정지 거리를 구하는 올바른 방법은?", a: 5, options: ["제동 거리 - 공주 거리", "제동 거리 * 공주 거리", "제동 거리 / 공주 시간", "공주 거리 + 제동 가속도", "제동 거리 + 공주 거리"], exp: "자동차의 정지 거리는 제동 거리와 공주 거리의 합으로 구합니다 [8]." },
        { q: "반려동물 등록 프로그램에서 리스트의 인덱스와 원소에 동시에 접근할 때 사용하는 함수는?", a: 2, options: ["range()", "enumerate()", "print()", "input()", "class()"], exp: "리스트의 인덱스와 원소에 동시에 접근하기 위해 enumerate() 함수를 사용합니다 [9]." },
        { q: "클래스 내부에서 객체의 속성을 출력하거나 기능을 수행하는 것을 무엇이라 하는가?", a: 4, options: ["변수", "인덱스", "인스턴스", "메서드", "데이터"], exp: "클래스 내에서 객체가 수행하는 기능을 메서드라고 합니다 [10, 11]." },
        { q: "반려동물 등록 프로그램 실습에서 '삭제(명령 2)'를 위해 입력받는 정보는?", a: 1, options: ["반려동물 이름과 등록자 이름", "등록 번호와 동물 종류", "등록 번호와 등록자 이름", "동물 종류와 동물 이름", "등록 번호만 입력"], exp: "삭제 시 반려동물 이름과 등록자 이름을 입력받아 리스트에서 삭제합니다 [10, 12]." },
        { q: "프로그램이 의도한 결과를 출력하는지 확인하고 공유하는 프로젝트의 마지막 단계는?", a: 5, options: ["주제 선정", "추상화", "알고리즘 설계", "프로그램 작성", "성능 평가 및 공유"], exp: "마지막 5단계는 성능 평가 항목을 확인하고 프로그램을 공유하는 단계입니다 [2, 3, 13]." },
        { q: "온라인으로 코드를 제출하여 실시간으로 채점받는 웹 기반 플랫폼을 무엇이라 하는가?", a: 3, options: ["검색 엔진", "소셜 미디어", "온라인 저지(OJ)", "클라우드 스토리지", "블록체인"], exp: "프로그래밍 문제를 해결한 코드를 제출하여 실시간으로 채점하는 플랫폼을 온라인 저지라고 합니다 [14]." },
        { q: "다음 중 소스 자료에서 언급된 국내 대표 온라인 저지 사이트가 아닌 것은?", a: 4, options: ["코드업", "프로그래머스", "백준", "네이버", "모두 언급됨"], exp: "대표적인 국내 온라인 저지로 코드업, 프로그래머스, 백준이 언급되었습니다 [14]." },
        { q: "컴퓨터가 이해할 수 있는 언어로 바꾸는 과정을 무엇이라 하는가?", a: 2, options: ["디버깅", "컴파일", "모델링", "추상화", "인덱싱"], exp: "컴퓨터가 이해할 수 있는 언어로 바꾸는 과정을 컴파일(Compile)이라고 합니다 [14]." }
    ];

    const quizList = document.getElementById('quiz-list');
    quizData.forEach((data, i) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `<div class="q-title">${i+1}. ${data.q}</div>
            <ul class="options">
                ${data.options.map((opt, idx) => `<li><input type="radio" name="q${i}" value="${idx+1}"> ${idx+1}) ${opt}</li>`).join('')}
            </ul>`;
        quizList.appendChild(card);
    });

    function downloadReport() {
        const id = document.getElementById('studentId').value;
        const name = document.getElementById('studentName').value;
        if(!id || !name) { alert("학번과 이름을 입력해주세요."); return; }

        let score = 0;
        let reportText = `[ 3-8. 협력적 문제 해결 프로젝트 학습 결과 리포트 ]\n학번: ${id}\n이름: ${name}\n\n`;
        
        quizData.forEach((data, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const userAns = selected ? parseInt(selected.value) : 0;
            const isCorrect = userAns === data.a;
            if(isCorrect) score += 5;
            
            reportText += `${i+1}번 문제: ${isCorrect ? "정답 (O)" : "오답 (X)"}\n`;
            reportText += `  - 학생의 선택: ${userAns === 0 ? "미응답" : userAns + "번"}, 정답: ${data.a}번\n`;
            reportText += `  - 상세 풀이: ${data.exp}\n\n`;
        });

        const now = new Date();
        const timeStr = now.toLocaleString();
        reportText += `--------------------------------\n최종 점수: ${score} / 100\n응시 시각: ${timeStr}`;

        const fileName = `${id}_${name}_${score}_3-8단원_${now.getTime()}.txt`;
        const blob = new Blob([reportText], { type: 'text/plain;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = fileName;
        link.click();
        
        alert(`제출되었습니다! 점수: ${score}점\n상세 풀이가 담긴 리포트(${fileName})가 다운로드됩니다.`);
    }
</script>
</body>
</html>
