<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>정보 3-4. 표준 입출력과 파일 입출력 퀴즈</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; max-width: 900px; margin: 20px auto; padding: 20px; background-color: #f0f7f4; }
        .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border-top: 10px solid #27ae60; }
        h1 { color: #27ae60; text-align: center; border-bottom: 3px solid #27ae60; padding-bottom: 10px; }
        .user-info { background: #eafaf1; padding: 20px; border-radius: 10px; margin-bottom: 30px; display: flex; gap: 20px; justify-content: center; }
        .user-info input { padding: 10px; border: 1px solid #2ecc71; border-radius: 5px; width: 180px; }
        .q-card { background: #fff; border: 1px solid #d5f5e3; padding: 25px; margin-bottom: 25px; border-radius: 10px; }
        .q-title { font-size: 1.1em; font-weight: bold; margin-bottom: 15px; color: #145a32; }
        .options { list-style: none; padding: 0; }
        .options li { margin: 8px 0; padding: 8px; border-radius: 5px; transition: 0.2s; border: 1px solid transparent; }
        .options li:hover { background-color: #e9f7ef; border-color: #2ecc71; }
        button { display: block; width: 100%; padding: 20px; background: #27ae60; color: white; border: none; border-radius: 10px; font-size: 1.2em; font-weight: bold; cursor: pointer; }
        button:hover { background: #1e8449; }
    </style>
</head>
<body>

<div class="container">
    <h1>3-4. 표준 입출력과 파일 입출력 퀴즈</h1>
    
    <div class="user-info">
        <input type="text" id="studentId" placeholder="학번 (예: 30401)">
        <input type="text" id="studentName" placeholder="이름 (예: 김철수)">
    </div>

    <div id="quiz-list"></div>

    <button onclick="downloadReport()">제출 및 상세 결과 파일 다운로드</button>
</div>

<script>
    const quizData = [
        { q: "장치를 지정하지 않았을 때 일반적으로 키보드로 입력하고 모니터로 출력하는 것을 무엇이라 하는가?", a: 2, options: ["파일 입출력", "표준 입출력", "네트워크 통신", "데이터 구조화", "메모리 할당"], exp: "특별히 장치를 지정하지 않았을 경우 키보드 입력과 모니터 출력을 표준 입출력이라고 합니다 [1, 2]." },
        { q: "파이썬에서 모니터 화면에 값을 출력할 때 사용하는 내장 함수는?", a: 1, options: ["print()", "input()", "open()", "write()", "read()"], exp: "print() 함수는 모니터 화면에 값을 출력하는 파이썬 내장 함수입니다 [1]." },
        { q: "print() 함수에서 여러 데이터를 쉼표(,)로 구분하여 작성했을 때의 특징은?", a: 4, options: ["줄바꿈이 일어난다.", "데이터가 모두 붙어서 출력된다.", "데이터가 출력되지 않는다.", "출력값 사이에 공백이 추가된다.", "오류가 발생한다."], exp: "쉼표로 구분된 값 사이에는 자동으로 공백이 추가됩니다 [1, 3]." },
        { q: "수치형 데이터를 문자열과 연결하여 출력하기 위해 사용하는 함수는?", a: 3, options: ["int()", "float()", "str()", "bool()", "type()"], exp: "str() 함수를 사용하여 수치형 데이터를 문자열 자료형으로 변환한 뒤 연결 연산을 할 수 있습니다 [3, 4]." },
        { q: "f-문자열 포매팅(f-string)의 올바른 형식은?", a: 5, options: ["print('f{변수}')", "f-print('{변수}')", "format(f'변수')", "print(f'문자열 변수')", "f'문자열 {변수}'"], exp: "문자열 앞에 f를 붙이고 중괄호 { } 안에 변수명을 작성하는 방식입니다 [5, 6]." },
        { q: "출력이 끝난 뒤 자동으로 줄을 바꾸어 주는 함수는?", a: 1, options: ["print()", "input()", "write()", "read()", "open()"], exp: "print() 함수는 출력이 끝난 뒤 자동으로 줄을 바꾸어 주는 특징이 있습니다 [7]." },
        { q: "키보드를 통해 값을 입력받기 위해 사용하는 함수는?", a: 2, options: ["print()", "input()", "open()", "read()", "type()"], exp: "input() 함수는 사용자로부터 데이터를 키보드로 입력받기 위해 사용합니다 [7, 8]." },
        { q: "input() 함수로 입력받은 데이터의 기본 자료형은 무엇인가?", a: 3, options: ["정수형(int)", "실수형(float)", "문자열(str)", "불(bool)", "리스트(list)"], exp: "input() 함수로 입력받은 값은 숫자를 입력하더라도 항상 문자열(str) 자료형으로 저장됩니다 [9]." },
        { q: "입력받은 값을 정수형으로 변환하기 위해 사용하는 함수는?", a: 1, options: ["int()", "float()", "str()", "type()", "open()"], exp: "입력받은 값을 수치 계산에 사용하려면 int() 함수로 정수형 변환을 해야 합니다 [10, 11]." },
        { q: "문자열 안에서 줄바꿈을 하기 위해 사용하는 이스케이프 문자는?", a: 4, options: ["\\t", "\\b", "\\'", "\\n", "\\\""], exp: "\\n은 줄바꿈 기능을 수행하는 이스케이프 문자입니다 [7, 12]." },
        { q: "방대한 자료를 저장하고 공유 및 분석하기 위해 효율적인 입출력 방식은?", a: 5, options: ["표준 입력", "표준 출력", "print 활용", "변수 저장", "파일 입출력"], exp: "방대한 자료를 효율적으로 처리하고 재사용하려면 파일 입출력을 활용해야 합니다 [2, 13]." },
        { q: "파일 입출력의 올바른 절차를 순서대로 나열한 것은?", a: 2, options: ["처리-열기-닫기", "열기-처리-닫기", "열기-닫기-처리", "처리-닫기-열기", "닫기-열기-처리"], exp: "파일 입출력은 1) 파일 열기, 2) 파일 처리(읽기/쓰기), 3) 파일 닫기 순으로 진행됩니다 [2, 14]." },
        { q: "파일을 열 때 사용하는 함수와 닫을 때 사용하는 함수는?", a: 1, options: ["open(), close()", "read(), write()", "input(), print()", "start(), end()", "new(), save()"], exp: "open() 함수로 파일을 열고, 처리가 끝나면 close() 함수로 반드시 닫아야 합니다 [14, 15]." },
        { q: "기존 파일의 내용을 유지하면서 새로운 내용을 끝에 추가할 때 사용하는 모드는?", a: 3, options: ["'r' 모드", "'w' 모드", "'a' 모드", "'x' 모드", "'t' 모드"], exp: "'a' 모드는 추가(append) 모드로 기존 내용에 데이터를 덧붙일 때 사용합니다 [15, 16]." },
        { q: "파일을 새로 생성하거나 기존 내용을 모두 삭제하고 새로 쓸 때 사용하는 모드는?", a: 2, options: ["'r' 모드", "'w' 모드", "'a' 모드", "'read' 모드", "'write' 모드"], exp: "'w' 모드는 쓰기(write) 모드로 파일이 없으면 생성하고, 있으면 내용을 삭제하고 새로 씁니다 [15, 16]." },
        { q: "데이터를 쉼표(,)로 구분하여 저장한 파일 형식의 약칭은?", a: 4, options: ["TXT", "DOCX", "PPTX", "CSV", "PDF"], exp: "CSV는 'Comma Separated Value'의 약자로 데이터를 쉼표로 구분한 형식입니다 [17]." },
        { q: "파일 전체의 내용을 읽어오기 위해 사용하는 함수는?", a: 5, options: ["print()", "write()", "open()", "input()", "read()"], exp: "read() 함수는 파일의 전체 내용을 읽어오는 데 사용합니다 [14, 18]." },
        { q: "close() 함수를 생략해도 블록을 벗어나면 자동으로 파일을 닫아주는 키워드는?", a: 1, options: ["with", "for", "while", "if", "try"], exp: "with 키워드를 사용하여 파일을 열면 close()를 생략해도 자동으로 닫힙니다 [19]." },
        { q: "write() 함수의 괄호 안에 들어갈 수 있는 데이터 형식은?", a: 2, options: ["정수 데이터", "문자열 데이터", "실수 데이터", "리스트 데이터", "불 데이터"], exp: "write() 함수의 괄호 안에는 문자열 데이터 한 개가 들어갈 수 있습니다 [12]." },
        { q: "정수와 실수의 산술 연산 결과는 항상 어떤 자료형이 되는가?", a: 2, options: ["정수형(int)", "실수형(float)", "문자열(str)", "불(bool)", "오류 발생"], exp: "정수와 실수의 산술 연산 결과는 항상 실수형(float)이 됩니다 [20]." }
    ];

    const quizList = document.getElementById('quiz-list');
    quizData.forEach((data, i) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `<div class="q-title">${i+1}. ${data.q}</div>
            <ul class="options">
                ${data.options.map((opt, idx) => `<li><input type="radio" name="q${i}" value="${idx+1}"> ${idx+1}) ${opt}</li>`).join('')}
            </ul>`;
        quizList.appendChild(card);
    });

    function downloadReport() {
        const id = document.getElementById('studentId').value;
        const name = document.getElementById('studentName').value;
        if(!id || !name) { alert("학번과 이름을 모두 입력해주세요."); return; }

        let score = 0;
        let reportText = `[ 3-4. 표준 입출력과 파일 입출력 학습 성취도 보고서 ]\n학번: ${id}\n이름: ${name}\n\n`;
        
        quizData.forEach((data, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const userAns = selected ? parseInt(selected.value) : 0;
            const isCorrect = userAns === data.a;
            if(isCorrect) score += 5;
            
            reportText += `${i+1}번 문제: ${isCorrect ? "정답 (O)" : "오답 (X)"}\n`;
            reportText += `  - 학생 답안: ${userAns === 0 ? "미응답" : userAns + "번"}, 실제 정답: ${data.a}번\n`;
            reportText += `  - 상세 풀이: ${data.exp}\n\n`;
        });

        const now = new Date();
        const timeStr = now.toLocaleString();
        reportText += `--------------------------------\n최종 점수: ${score} / 100\n응시 시각: ${timeStr}`;

        const fileName = `${id}_${name}_${score}_3-4단원_${now.getTime()}.txt`;
        const blob = new Blob([reportText], { type: 'text/plain;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = fileName;
        link.click();
        
        alert(`제출 완료! 점수: ${score}점\n결과 리포트(${fileName})가 생성되었습니다.`);
    }
</script>
</body>
</html>
