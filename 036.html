<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>정보 3-6. 객체지향과 클래스 퀴즈</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; max-width: 900px; margin: 20px auto; padding: 20px; background-color: #f0f4f8; }
        .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border-top: 10px solid #3498db; }
        h1 { color: #2c3e50; text-align: center; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        .user-info { background: #e8f4fd; padding: 20px; border-radius: 10px; margin-bottom: 30px; display: flex; gap: 20px; justify-content: center; }
        .user-info input { padding: 10px; border: 1px solid #3498db; border-radius: 5px; width: 180px; }
        .q-card { background: #fff; border: 1px solid #dee2e6; padding: 25px; margin-bottom: 25px; border-radius: 10px; }
        .q-title { font-size: 1.1em; font-weight: bold; margin-bottom: 15px; color: #2c3e50; }
        .options { list-style: none; padding: 0; }
        .options li { margin: 8px 0; padding: 10px; border-radius: 5px; border: 1px solid #f1f1f1; cursor: pointer; transition: 0.3s; }
        .options li:hover { background-color: #eaf2f8; border-color: #3498db; }
        button { display: block; width: 100%; padding: 20px; background: #3498db; color: white; border: none; border-radius: 10px; font-size: 1.2em; font-weight: bold; cursor: pointer; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>

<div class="container">
    <h1>3-6. 객체지향과 클래스 퀴즈</h1>
    
    <div class="user-info">
        <input type="text" id="studentId" placeholder="학번 (예: 30601)">
        <input type="text" id="studentName" placeholder="이름 (예: 홍길동)">
    </div>

    <div id="quiz-list"></div>

    <button onclick="generateReport()">제출 및 상세 결과 파일 다운로드</button>
</div>

<script>
    const quizData = [
        { q: "같은 기능이나 목적을 갖는 변수, 함수 등을 묶어서 상호 작용하며 실행되도록 구성하는 프로그래밍 방식은?", a: 3, options: ["절차지향", "구조적 프로그래밍", "객체지향", "하향식 프로그래밍", "선형 프로그래밍"], exp: "객체지향은 기능이나 목적이 같은 요소를 객체로 묶어 상호 작용하게 하는 방식입니다 [1]." },
        { q: "동일한 목적과 기능을 가진 속성과 메서드를 하나로 묶은 것을 무엇이라 하는가?", a: 2, options: ["함수", "객체", "클래스", "인스턴스", "변수"], exp: "객체(Object)는 속성과 메서드를 하나로 묶은 단위를 의미합니다 [1]." },
        { q: "객체지향에서 '객체가 가지고 있는 자료'를 의미하는 용어는?", a: 4, options: ["메서드", "함수", "인스턴스", "속성", "매개변수"], exp: "속성은 객체가 가지고 있는 자료를 뜻합니다 [1]." },
        { q: "객체지향에서 '객체가 수행하는 기능'을 의미하는 용어는?", a: 3, options: ["속성", "변수", "메서드", "데이터", "설계도"], exp: "메서드는 객체가 수행하는 기능을 의미합니다 [1]." },
        { q: "각 객체들이 갖는 속성과 메서드를 정의하고 있는 '틀' 혹은 '설계도'를 무엇이라 하는가?", a: 5, options: ["인스턴스", "메서드", "객체", "속성", "클래스"], exp: "클래스는 객체 생성을 위해 속성과 메서드를 정의한 틀입니다 [1, 2]." },
        { q: "클래스를 바탕으로 소프트웨어에 구현된 구체적인 실체는?", a: 1, options: ["인스턴스", "추상화", "메서드", "코드", "라이브러리"], exp: "인스턴스는 클래스를 바탕으로 실제 구현된 구체적인 실체입니다 [1, 2]." },
        { q: "파이썬에서 클래스를 생성하기 위해 사용하는 키워드는?", a: 2, options: ["def", "class", "create", "new", "struct"], exp: "파이썬에서는 'class' 키워드를 사용하여 클래스를 생성합니다 [3]." },
        { q: "클래스 내부에서 객체 생성 시 초기화를 담당하는 생성자 함수의 명칭은?", a: 3, options: ["__start__", "__main__", "__init__", "__new__", "__constructor__"], exp: "__init__ 메서드는 객체 생성 시 초기화를 담당하는 생성자 함수입니다 [4, 5]." },
        { q: "클래스의 메서드를 정의할 때 첫 번째 매개 변수로 관례적으로 사용하는 단어는?", a: 4, options: ["this", "obj", "my", "self", "init"], exp: "클래스 내부 함수의 첫 번째 속성으로는 관례적으로 'self'를 사용합니다 [6, 7]." },
        { q: "인스턴스가 특정 클래스에서 만들어졌는지 확인하기 위해 사용하는 함수는?", a: 2, options: ["type()", "isinstance()", "check_class()", "id()", "isclass()"], exp: "isinstance() 함수는 인스턴스가 어떤 클래스 소속인지 확인하여 True/False를 반환합니다 [8]." },
        { q: "복잡한 자료나 시스템으로부터 핵심적인 개념 또는 기능을 간추려 내는 객체지향의 특징은?", a: 4, options: ["상속", "캡슐화", "다형성", "추상화", "모듈화"], exp: "추상화는 복잡한 시스템에서 핵심적인 요소만 추출하는 것을 의미합니다 [9, 10]." },
        { q: "데이터와 알고리즘을 하나로 묶고, 외부 소통을 메서드로만 제한하여 데이터를 보호하는 특징은?", a: 1, options: ["캡슐화", "다형성", "상속", "추상화", "구조화"], exp: "캡슐화는 데이터와 알고리즘을 묶고 외부 소통을 제한하여 사용 편의성을 높이는 특성입니다 [10]." },
        { q: "이미 작성된 클래스를 활용하여 새로운 클래스를 생성함으로써 코드를 재활용하는 특징은?", a: 5, options: ["다형성", "추상화", "캡슐화", "객체화", "상속"], exp: "상속은 기존 코드를 재활용하여 새로운 클래스를 생성하는 것을 의미합니다 [10]." },
        { q: "동일한 작업을 하는 메서드들에 똑같은 이름을 부여하여 코드를 간결하게 만드는 특징은?", a: 2, options: ["추상화", "다형성", "상속", "캡슐화", "일반화"], exp: "다형성은 하나의 이름으로 다양한 상황에 대처하여 코드를 간결하게 만듭니다 [10]." },
        { q: "프로그램이 위에서 아래로 순서에 맞게 실행되는 단계적 프로그래밍 방식은?", a: 2, options: ["객체지향", "구조적 프로그래밍", "이벤트 기반", "비동기 프로그래밍", "분산 프로그래밍"], exp: "구조적 프로그래밍은 위에서 아래로 순서대로 실행되는 하향식 방식입니다 [11]." },
        { q: "일반적으로 파이썬에서 클래스 이름을 정할 때의 관례는?", a: 4, options: ["모두 소문자로 씀", "언더바로 시작함", "숫자로 시작함", "알파벳 대문자로 시작함", "특수문자를 포함함"], exp: "일반적으로 클래스 이름은 알파벳 대문자로 시작하도록 권장됩니다 [7]." },
        { q: "인스턴스 s의 'informatics'라는 속성 값을 확인하기 위한 올바른 표현은?", a: 5, options: ["s->informatics", "s(informatics)", "s[informatics]", "informatics(s)", "s.informatics"], exp: "인스턴스 식별자 뒤에 마침표(.)를 찍어 속성이나 메서드에 접근합니다 [12, 13]." },
        { q: "동일한 메서드를 실행하는 객체를 여러 개 만들 때 클래스를 사용하는 가장 큰 이유는?", a: 2, options: ["오류가 전혀 발생하지 않아서", "객체 생성과 관리가 효율적이어서", "메모리를 전혀 사용하지 않아서", "변수 선언이 필요 없어서", "순서대로 실행하기 위해서"], exp: "클래스를 활용하면 동일한 속성과 메서드를 가진 객체를 효율적으로 대량 생산할 수 있습니다 [14, 15]." },
        { q: "print() 함수 내에서 문자열 사이를 일정한 간격으로 띄워 구분할 때 쓰는 옵션은?", a: 3, options: ["end=' '", "newline=' '", "sep='\\t'", "tab=True", "space=8"], exp: "sep='\\t' 옵션은 일정한 간격을 띄워 문자열을 구분하는 역할을 합니다 [13]." },
        { q: "객체지향 프로그래밍에 대한 설명으로 옳지 않은 것은?", a: 3, options: ["객체를 조합하여 프로그래밍한다.", "코드 해석의 어려움을 보완한다.", "속성은 객체가 수행하는 기능이다.", "클래스는 설계도라고 할 수 있다.", "구체적인 실체를 인스턴스라고 한다."], exp: "기능을 의미하는 것은 메서드이며, 속성은 객체가 가지고 있는 자료입니다 [1]." }
    ];

    const quizList = document.getElementById('quiz-list');
    quizData.forEach((data, i) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `<div class="q-title">${i+1}. ${data.q}</div>
            <ul class="options">
                ${data.options.map((opt, idx) => `<li><input type="radio" name="q${i}" value="${idx+1}"> ${idx+1}) ${opt}</li>`).join('')}
            </ul>`;
        quizList.appendChild(card);
    });

    function generateReport() {
        const id = document.getElementById('studentId').value;
        const name = document.getElementById('studentName').value;
        if(!id || !name) { alert("학번과 이름을 입력해주세요."); return; }

        let score = 0;
        let reportText = `[ 3-6. 객체지향과 클래스 학습 결과 보고서 ]\n학번: ${id}\n이름: ${name}\n\n`;
        
        quizData.forEach((data, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const userAns = selected ? parseInt(selected.value) : 0;
            const isCorrect = userAns === data.a;
            if(isCorrect) score += 5;
            
            reportText += `${i+1}번 문제: ${isCorrect ? "O (정답)" : "X (오답)"}\n`;
            reportText += `  - 학생의 선택: ${userAns === 0 ? "미응답" : userAns + "번"}, 정답: ${data.a}번\n`;
            reportText += `  - 상세 풀이: ${data.exp}\n\n`;
        });

        const now = new Date();
        const timeStr = now.toLocaleString();
        reportText += `--------------------------------\n최종 점수: ${score} / 100\n응시 시각: ${timeStr}`;

        const fileName = `${id}_${name}_${score}_3-6단원_${now.getTime()}.txt`;
        const blob = new Blob([reportText], { type: 'text/plain;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = fileName;
        link.click();
        
        alert(`제출 완료! 점수: ${score}점\n결과 파일이 다운로드됩니다.`);
    }
</script>
</body>
</html>
